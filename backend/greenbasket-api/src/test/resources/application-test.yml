spring:
  datasource:
    url: jdbc:h2:mem:greenbasket_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: WARN
    com.greenbasket: INFO

app:
  jwt:
    secret: test-jwt-secret-key-minimum-256-bits-long-for-hs256-algorithm-security-requirement
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
    issuer: greenbasket-api-test
  auth:
    email-verification-expiration-ms: 86400000
    password-reset-expiration-ms: 3600000
